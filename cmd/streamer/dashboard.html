<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Stream — Rate Limiter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --border2: #21262d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --blue:    #58a6ff;
    --green:   #3fb950;
    --red:     #f85149;
    --yellow:  #d29922;
    --purple:  #bc8cff;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Nav ── */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 52px;
    gap: 0;
  }
  nav .brand {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-right: 32px;
  }
  nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.84rem;
    padding: 0 14px;
    height: 52px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  nav a:hover  { color: var(--text); }
  nav a.active { color: var(--text); border-bottom-color: var(--blue); }
  nav .spacer  { flex: 1; }

  .ws-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    transition: all .3s;
  }
  .ws-badge.connected    { background: #1a3a2a; color: var(--green); border: 1px solid #2a5a3a; }
  .ws-badge.disconnected { background: #3a1a1a; color: var(--red);   border: 1px solid #6e2a2a; }
  .ws-badge .dot {
    width: 7px; height: 7px; border-radius: 50%; background: currentColor;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* ── Layout ── */
  .page { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 14px 16px;
  }
  .stat-card .sl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .stat-card .sv { font-size: 1.65rem; font-weight: 700; margin-top: 5px; }
  .stat-card .sv.blue   { color: var(--blue); }
  .stat-card .sv.green  { color: var(--green); }
  .stat-card .sv.red    { color: var(--red); }
  .stat-card .sv.yellow { color: var(--yellow); }
  .stat-card .sv.purple { color: var(--purple); }

  /* Sparkline */
  .spark {
    height: 34px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    margin-top: 8px;
  }
  .spark .sb {
    flex: 1;
    border-radius: 2px 2px 0 0;
    min-height: 2px;
    transition: height .25s;
  }
  .spark .sb.g { background: var(--green); opacity: .7; }
  .spark .sb.r { background: var(--red);   opacity: .6; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .toolbar input, .toolbar select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.82rem;
    outline: none;
    transition: border-color .15s;
  }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--blue); }
  .toolbar input::placeholder { color: var(--muted); }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--border2);
    color: var(--text);
    transition: background .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn.active { background: #1a2d3a; border-color: var(--blue); color: var(--blue); }
  .btn.danger { color: var(--red); border-color: #6e2a2a; }
  .btn.danger:hover { background: #3a1a1a; }

  .toolbar-spacer { flex: 1; }

  /* ── Event table ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .table-card-header {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .table-wrap { max-height: 520px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.81rem; }
  thead { position: sticky; top: 0; background: #1c2128; z-index: 1; }
  th {
    padding: 9px 12px;
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: .05em;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 7px 12px; border-bottom: 1px solid var(--border2); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr.new td { animation: flash .35s ease-out; }
  @keyframes flash { from { background: #1a2d3a; } to { background: transparent; } }

  .pill {
    display: inline-block; padding: 2px 8px;
    border-radius: 10px; font-size: 0.72rem; font-weight: 500;
  }
  .pill.ok { background: #1a3a2a; color: var(--green); }
  .pill.no { background: #3a1a1a; color: var(--red); }
  .pill.tb { background: #1e2a3a; color: var(--blue); }
  .pill.sw { background: #2a1e3a; color: var(--purple); }

  .cell-ts  { color: var(--muted); font-family: monospace; font-size: 0.75rem; }
  .cell-lat { font-family: monospace; color: var(--yellow); }
  .cell-ns  { color: var(--blue); }
  .cell-inst{ color: var(--muted); font-size: 0.75rem; font-family: monospace; max-width: 90px; overflow: hidden; text-overflow: ellipsis; }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 10px;
    padding: 0 2px;
    flex-wrap: wrap;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<nav>
  <a class="brand" href="/">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Rate Limiter
  </a>
  <a href="http://localhost:8080" target="_blank">Playground</a>
  <a href="/" class="active">Event Stream</a>
  <a href="http://localhost:4000" target="_blank">Debug</a>
  <a href="http://localhost:3000" target="_blank">Grafana</a>
  <div class="spacer"></div>
  <span class="ws-badge disconnected" id="ws-badge">
    <span class="dot"></span>
    <span id="ws-text">Connecting</span>
  </span>
</nav>

<div class="page">

  <!-- Stats row -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="sl">Total Events</div>
      <div class="sv blue" id="s-total">0</div>
    </div>
    <div class="stat-card">
      <div class="sl">Allowed</div>
      <div class="sv green" id="s-allowed">0</div>
    </div>
    <div class="stat-card">
      <div class="sl">Denied</div>
      <div class="sv red" id="s-denied">0</div>
    </div>
    <div class="stat-card">
      <div class="sl">Allow Rate</div>
      <div class="sv yellow" id="s-rate">—</div>
    </div>
    <div class="stat-card">
      <div class="sl">Events / sec</div>
      <div class="sv blue" id="s-eps">0</div>
      <div class="spark" id="spark-allow"></div>
    </div>
    <div class="stat-card">
      <div class="sl">Denied / sec</div>
      <div class="sv red" id="s-dps">0</div>
      <div class="spark" id="spark-deny"></div>
    </div>
    <div class="stat-card">
      <div class="sl">Avg Latency</div>
      <div class="sv yellow" id="s-lat">—</div>
    </div>
    <div class="stat-card">
      <div class="sl">WS Clients</div>
      <div class="sv purple" id="s-clients">—</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input id="f-ns"  type="text" placeholder="Filter namespace…" style="width:180px">
    <input id="f-key" type="text" placeholder="Filter key…"       style="width:160px">
    <select id="f-algo">
      <option value="">All algorithms</option>
      <option value="tb">Token Bucket</option>
      <option value="sw">Sliding Window</option>
    </select>
    <select id="f-result">
      <option value="">All results</option>
      <option value="1">Allowed only</option>
      <option value="0">Denied only</option>
    </select>
    <div class="toolbar-spacer"></div>
    <button class="btn" id="btn-pause" onclick="togglePause()">Pause</button>
    <button class="btn danger"         onclick="clearTable()">Clear</button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-card-header">
      <span>Live Events</span>
      <span id="showing">0 events visible</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Namespace</th>
            <th>Key</th>
            <th>Algorithm</th>
            <th>Result</th>
            <th>Remaining</th>
            <th>Latency</th>
            <th>Instance</th>
          </tr>
        </thead>
        <tbody id="evt-body"></tbody>
      </table>
    </div>
  </div>

  <div class="status-bar">
    <span id="sb-dropped">Dropped (paused): 0</span>
    <span id="sb-buf">Buffer: —</span>
    <span id="sb-time" style="margin-left:auto"></span>
  </div>

</div>

<script>
const MAX_ROWS   = 250;
const SPARK_BINS = 20;

let paused    = false;
let total     = 0, allowed = 0, denied = 0;
let latSum    = 0, latCnt  = 0;
let epsAllow  = 0, epsDeny = 0;
let dropped   = 0;
let pending   = [];
let allowHist = new Array(SPARK_BINS).fill(0);
let denyHist  = new Array(SPARK_BINS).fill(0);

const $ = id => document.getElementById(id);

function matches(e) {
  const ns     = $('f-ns').value.trim().toLowerCase();
  const key    = $('f-key').value.trim().toLowerCase();
  const algo   = $('f-algo').value;
  const result = $('f-result').value;
  if (ns     && !e.ns.toLowerCase().includes(ns)) return false;
  if (key    && !e.key.toLowerCase().includes(key)) return false;
  if (algo   && e.algo !== algo) return false;
  if (result && String(e.allowed ? 1 : 0) !== result) return false;
  return true;
}

function fmt(ms) {
  const d = new Date(ms);
  return d.toTimeString().slice(0,8) + '.' + String(d.getMilliseconds()).padStart(3,'0');
}
function fmtLat(us) {
  return us < 1000 ? us + 'µs' : (us / 1000).toFixed(2) + 'ms';
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addRow(e) {
  if (!matches(e)) return;
  const tbody = $('evt-body');
  const algoClass = e.algo === 'tb' ? 'tb' : 'sw';
  const algoLabel = e.algo === 'tb' ? 'Token Bucket' : e.algo === 'sw' ? 'Sliding Window' : e.algo;
  const instShort = (e.instance || '—').substring(0, 12);

  const tr = document.createElement('tr');
  tr.className = 'new';
  tr.innerHTML = `
    <td class="cell-ts">${fmt(e.ts)}</td>
    <td class="cell-ns">${esc(e.ns || '—')}</td>
    <td>${esc(e.key || '—')}</td>
    <td><span class="pill ${algoClass}">${algoLabel}</span></td>
    <td><span class="pill ${e.allowed ? 'ok' : 'no'}">${e.allowed ? '✓ allowed' : '✗ denied'}</span></td>
    <td>${e.remaining ?? '—'}</td>
    <td class="cell-lat">${fmtLat(e.latency_us || 0)}</td>
    <td class="cell-inst" title="${esc(e.instance)}">${esc(instShort)}</td>
  `;
  tbody.insertBefore(tr, tbody.firstChild);
  while (tbody.rows.length > MAX_ROWS) tbody.deleteRow(tbody.rows.length - 1);
  $('showing').textContent = tbody.rows.length + ' events visible';
}

function flushPending() {
  pending.forEach(addRow);
  pending = [];
}

function togglePause() {
  paused = !paused;
  const btn = $('btn-pause');
  btn.textContent = paused ? 'Resume' : 'Pause';
  btn.className   = paused ? 'btn active' : 'btn';
  if (!paused) flushPending();
}

function clearTable() {
  $('evt-body').innerHTML = '';
  $('showing').textContent = '0 events visible';
  total = allowed = denied = latSum = latCnt = dropped = 0;
  pending = [];
  updateStats();
}

function updateStats() {
  $('s-total').textContent   = total.toLocaleString();
  $('s-allowed').textContent = allowed.toLocaleString();
  $('s-denied').textContent  = denied.toLocaleString();
  $('s-rate').textContent    = total > 0 ? ((allowed / total) * 100).toFixed(1) + '%' : '—';
  $('s-lat').textContent     = latCnt > 0 ? fmtLat(Math.round(latSum / latCnt)) : '—';
  $('sb-dropped').textContent = 'Dropped (paused): ' + dropped;
  $('sb-time').textContent    = new Date().toLocaleTimeString();
}

// Sparkline ticker
setInterval(() => {
  allowHist.push(epsAllow); allowHist = allowHist.slice(-SPARK_BINS);
  denyHist.push(epsDeny);   denyHist  = denyHist.slice(-SPARK_BINS);
  $('s-eps').textContent = epsAllow.toLocaleString();
  $('s-dps').textContent = epsDeny.toLocaleString();
  epsAllow = epsDeny = 0;
  renderSpark('spark-allow', allowHist, 'g');
  renderSpark('spark-deny',  denyHist,  'r');
  updateStats();
}, 1000);

function renderSpark(id, data, cls) {
  const max = Math.max(...data, 1);
  $(id).innerHTML = data.map(v => {
    const h = Math.max(2, Math.round((v / max) * 32));
    return `<div class="sb ${cls}" style="height:${h}px"></div>`;
  }).join('');
}

// Buffer stats poll
setInterval(async () => {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    $('s-clients').textContent = d.connected_clients ?? '—';
    $('sb-buf').textContent = `Buffer: ${d.central_buf_used}/${d.central_buf_cap}`;
  } catch {}
}, 2000);

// WebSocket
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws    = new WebSocket(`${proto}://${location.host}/ws/events`);

  ws.onopen = () => {
    $('ws-badge').className = 'ws-badge connected';
    $('ws-text').textContent = 'Connected';
  };
  ws.onclose = () => {
    $('ws-badge').className = 'ws-badge disconnected';
    $('ws-text').textContent = 'Reconnecting…';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();

  ws.onmessage = ({ data }) => {
    let e;
    try { e = JSON.parse(data); } catch { return; }

    total++;
    if (e.allowed) { allowed++; epsAllow++; } else { denied++; epsDeny++; }
    latSum += e.latency_us || 0;
    latCnt++;

    if (paused) {
      pending.push(e);
      if (pending.length > 1000) { pending.shift(); dropped++; }
      return;
    }
    addRow(e);
  };
}

connect();
</script>
</body>
</html>
